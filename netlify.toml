[build]
  command = "echo 'No build step needed for static site'"
  # CLI deploy rsyncs sources here first (no 71MB node_modules crawl). Git builds must commit netlify/functions.
  functions = "netlify/functions"
  publish = "propedge-deploy"

# Faster packaging: copy SDK trees verbatim instead of deep esgraph tracing (avoids lock-ups locally).
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["googleapis", "@anthropic-ai/sdk"]

[dev]
  framework = "none"
  port = 8888

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env]
  FIREBASE_API_KEY = "your-api-key-here"
  FIREBASE_AUTH_DOMAIN = "your-project.firebaseapp.com"
  FIREBASE_PROJECT_ID = "your-project-id"
  FIREBASE_STORAGE_BUCKET = "your-project.appspot.com"
  FIREBASE_MESSAGING_SENDER_ID = "your-sender-id"
  FIREBASE_APP_ID = "your-app-id"

[context.production]
  environment = { FIREBASE_ENV = "production" }

[context.deploy-preview]
  environment = { FIREBASE_ENV = "staging" }

[context.branch-deploy]
  environment = { FIREBASE_ENV = "staging" }
