<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PropEdge favicon: dark navy disc with green diamond + orange glow halo -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#0d1f33"/>
      <stop offset="80%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#020611"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#ff8a1c" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#ff6a00" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#39ff8a"/>
      <stop offset="100%" stop-color="#0fb35a"/>
    </linearGradient>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- orange glow ring (the missing element on the old favicon) -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>

  <!-- inner disc -->
  <circle cx="32" cy="32" r="24" fill="url(#bg)" stroke="#ff8a1c" stroke-width="2.5" stroke-opacity="0.85"/>

  <!-- green diamond mark -->
  <g filter="url(#softglow)">
    <polygon points="32,14 48,32 32,50 16,32" fill="url(#diamond)"/>
    <polygon points="32,20 42,32 32,44 22,32" fill="#0d1f33" opacity="0.55"/>
    <text x="32" y="37" text-anchor="middle"
          font-family="-apple-system,Segoe UI,Roboto,sans-serif"
          font-size="14" font-weight="800" fill="#39ff8a">P</text>
  </g>
</svg>
