[build]
  command = "npm install"
  # Install dependencies so netlify/functions can bundle with esbuild
  # Git builds must commit netlify/functions (esbuild bundles them during deploy)
  functions = "netlify/functions"
  publish = "propedge-deploy"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["googleapis", "google-auth-library", "puppeteer"]

# Scheduled function: Pitcher ERA enrichment
# Runs daily at 8 AM ET to fetch pitcher data and update Google Sheet
[[functions."enrich-pitcher-era".scheduling]]
  cron = "0 12 * * *"  # 12 UTC = 8 AM ET (adjust for daylight savings)

[dev]
  framework = "none"
  port = 8888

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env]
  FIREBASE_API_KEY = "your-api-key-here"
  FIREBASE_AUTH_DOMAIN = "your-project.firebaseapp.com"
  FIREBASE_PROJECT_ID = "your-project-id"
  FIREBASE_STORAGE_BUCKET = "your-project.appspot.com"
  FIREBASE_MESSAGING_SENDER_ID = "your-sender-id"
  FIREBASE_APP_ID = "your-app-id"

[context.production]
  environment = { FIREBASE_ENV = "production" }

[context.deploy-preview]
  environment = { FIREBASE_ENV = "staging" }

[context.branch-deploy]
  environment = { FIREBASE_ENV = "staging" }
