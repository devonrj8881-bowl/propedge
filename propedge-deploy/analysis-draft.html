<!DOCTYPE html>
<html>
<head>
  <title>PropEdge Analysis Draft</title>
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background: #1a1d2e; color: #f5f7fb; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .analysis-card {
      background: #262d3f; border: 1px solid rgba(0,240,160,0.2); border-radius: 12px;
      padding: 24px; margin: 16px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .player-header { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #00f0a0; }
    .prop-line { font-size: 14px; color: #c5cfe0; margin-bottom: 16px; }
    .analysis-text {
      font-size: 16px; line-height: 1.6; color: #e8eef5; margin: 16px 0;
      padding: 12px; background: rgba(0,240,160,0.05); border-left: 3px solid #00f0a0; border-radius: 4px;
    }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 16px 0; }
    .stat-box { background: rgba(0,240,160,0.08); padding: 12px; border-radius: 8px; }
    .stat-label { font-size: 12px; color: #8a95ac; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #00f0a0; font-family: 'JetBrains Mono'; }

    .chart-container { margin: 16px 0; }
    .bar-chart { display: flex; gap: 12px; align-items: flex-end; height: 60px; margin: 12px 0; }
    .bar { flex: 1; background: linear-gradient(180deg, #00f0a0, #5dade2); border-radius: 4px 4px 0 0; position: relative; min-width: 0; }
    .bar-label { font-size: 11px; color: #8a95ac; text-align: center; margin-top: 4px; }

    .confidence-gauge { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(#00f0a0 0deg, #5dade2 180deg, #8a95ac 360deg); display: flex; align-items: center; justify-content: center; margin: 12px 0; }
    .confidence-value { width: 90px; height: 90px; border-radius: 50%; background: #262d3f; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #00f0a0; }

    .trend-badge { display: inline-block; padding: 6px 12px; background: rgba(0,240,160,0.2); border: 1px solid #00f0a0; border-radius: 20px; font-size: 12px; color: #00f0a0; margin: 4px 4px 4px 0; font-weight: 600; }
    .trend-up { border-color: #00f0a0; color: #00f0a0; }
    .trend-down { border-color: #ff6b6b; color: #ff6b6b; }
    .trend-flat { border-color: #ffb85c; color: #ffb85c; }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 PropEdge Real-Data Analysis Draft</h1>
  <p>Sample recommendations with real L5/L10 data + visual analysis</p>

  <div id="analyses"></div>
</div>

<script>
const propData = {
  "Keldon Johnson-o9.5 Points + Rebounds": {
    "player": "Keldon Johnson", "team": "SAS", "position": "SF",
    "prop": "o9.5 Points + Rebounds", "l10_avg": 16.3, "l5_avg": 11.2,
    "streak": 28, "l5_hitrate": 100, "l10_hitrate": 100, "l20_hitrate": 100,
    "confidence": 39, "matchup_rank": "20"
  },
  "Ayo Dosunmu-o7.5 Points": {
    "player": "Ayo Dosunmu", "team": "MIN", "position": "SG",
    "prop": "o7.5 Points", "l10_avg": 19.8, "l5_avg": 21.8,
    "streak": 18, "l5_hitrate": 100, "l10_hitrate": 100, "l20_hitrate": 95,
    "confidence": 48, "matchup_rank": "15"
  },
  "Julius Randle-o20.5 Points + Rebounds": {
    "player": "Julius Randle", "team": "MIN", "position": "PF",
    "prop": "o20.5 Points + Rebounds", "l10_avg": 27.3, "l5_avg": 26.8,
    "streak": 12, "l5_hitrate": 100, "l10_hitrate": 100, "l20_hitrate": 85,
    "confidence": 51, "matchup_rank": "15"
  },
  "Jaden McDaniels-o14.5 Points + Rebounds": {
    "player": "Jaden McDaniels", "team": "MIN", "position": "SF",
    "prop": "o14.5 Points + Rebounds", "l10_avg": 23.9, "l5_avg": 25.8,
    "streak": 14, "l5_hitrate": 100, "l10_hitrate": 100, "l20_hitrate": 75,
    "confidence": 49, "matchup_rank": "15"
  }
};

function generateAnalysis(key, data) {
  const { player, team, prop, l5_avg, l10_avg, l5_hitrate, l10_hitrate, l20_hitrate,
          confidence, streak, matchup_rank } = data;

  // Trend calculation
  let trend = '';
  let trendClass = '';
  if (l5_hitrate > l10_hitrate) {
    trend = '📈 Hot Streak';
    trendClass = 'trend-up';
  } else if (l5_hitrate < l10_hitrate) {
    trend = '📉 Cooling';
    trendClass = 'trend-down';
  } else {
    trend = '➡️ Consistent';
    trendClass = 'trend-flat';
  }

  // Text analysis
  const analysisText = `${player} (${team} ${data.position}) averaging ${l5_avg} over last 5 games vs ${l10_avg} over 10. Hit rate: ${l5_hitrate}% L5 / ${l10_hitrate}% L10. Current ${streak}-game streak. Confidence: ${confidence}% vs ${matchup_rank} defense rank.`;

  // Bar chart for hitrates
  const maxHit = 100;
  const l5Height = (l5_hitrate / maxHit) * 100;
  const l10Height = (l10_hitrate / maxHit) * 100;
  const l20Height = (l20_hitrate / maxHit) * 100;

  return `
    <div class="analysis-card">
      <div class="player-header">${player} <span style="color: #8a95ac; font-size: 14px;">${team} • ${data.position}</span></div>
      <div class="prop-line"><strong>Prop:</strong> ${prop}</div>

      <div class="analysis-text">${analysisText}</div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">L5 Average</div>
          <div class="stat-value">${l5_avg}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">L10 Average</div>
          <div class="stat-value">${l10_avg}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Current Streak</div>
          <div class="stat-value">${streak}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Confidence</div>
          <div class="stat-value">${confidence}%</div>
        </div>
      </div>

      <div class="chart-container">
        <div style="font-size: 12px; color: #8a95ac; margin-bottom: 8px;">Hit Rate Trend</div>
        <div class="bar-chart">
          <div style="flex: 1;">
            <div class="bar" style="height: ${l5Height}%;"></div>
            <div class="bar-label">L5: ${l5_hitrate}%</div>
          </div>
          <div style="flex: 1;">
            <div class="bar" style="height: ${l10Height}%;"></div>
            <div class="bar-label">L10: ${l10_hitrate}%</div>
          </div>
          <div style="flex: 1;">
            <div class="bar" style="height: ${l20Height}%;"></div>
            <div class="bar-label">L20: ${l20_hitrate}%</div>
          </div>
        </div>
      </div>

      <div style="text-align: center; margin: 16px 0;">
        <div class="confidence-gauge">
          <div class="confidence-value" style="background: conic-gradient(#00f0a0 0deg, #00f0a0 ${confidence * 3.6}deg, rgba(0,240,160,0.2) ${confidence * 3.6}deg, rgba(0,240,160,0.2) 360deg);">
            ${confidence}%
          </div>
        </div>
      </div>

      <div style="text-align: center; margin: 12px 0;">
        <span class="trend-badge" style="border-color: ${trendClass === 'trend-up' ? '#00f0a0' : trendClass === 'trend-down' ? '#ff6b6b' : '#ffb85c'}; color: ${trendClass === 'trend-up' ? '#00f0a0' : trendClass === 'trend-down' ? '#ff6b6b' : '#ffb85c'};">
          ${trend}
        </span>
      </div>
    </div>
  `;
}

// Render all
const container = document.getElementById('analyses');
Object.keys(propData).forEach(key => {
  container.innerHTML += generateAnalysis(key, propData[key]);
});
</script>
</body>
</html>
